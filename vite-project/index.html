<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/10.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listify</title>

    <style>
      body {
        background-color: #212121;
      }
      @keyframes blinkCursor {
        50% {
          border-right-color: transparent;
        }
      }

      @keyframes typeAndDelete {
        0%, 10% { width: 0; }
        45%, 55% { width: 6.2em; }
        90%, 100% { width: 0; }
      }

      .terminal-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 0.1em solid #333;
        background-color: #1a1a1a;
        color: #0f0;
        font-family: "Courier New", Courier, monospace;
        font-size: 1em;
        padding: 1.5em 1em;
        width: 12em;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        border-radius: 4px;
        overflow: hidden;
        box-sizing: border-box;
        z-index: 9999;
      }

      .terminal-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1.5em;
        background-color: #333;
        border-top-left-radius: 4px;
        border-top-right-radius: 4px;
        padding: 0 0.4em;
        box-sizing: border-box;
      }

      .terminal-controls {
        float: right;
      }

      .control {
        display: inline-block;
        width: 0.6em;
        height: 0.6em;
        margin-left: 0.4em;
        border-radius: 50%;
        background-color: #777;
      }

      .control.close { background-color: #e33; }
      .control.minimize { background-color: #ee0; }
      .control.maximize { background-color: #0b0; }

      .terminal-title {
        float: left;
        line-height: 1.5em;
        color: #eee;
      }

      .text {
        display: inline-block;
        white-space: nowrap;
        overflow: hidden;
        border-right: 0.2em solid green;
        animation:
          typeAndDelete 4s steps(11) infinite,
          blinkCursor 0.5s step-end infinite alternate;
        margin-top: 1.5em;
      }
    </style>
  </head>

  <body>


    <div class="terminal-loader">
      <div class="terminal-header">
        <div class="terminal-title">Status</div>
        <div class="terminal-controls">
          <div class="control close"></div>
          <div class="control minimize"></div>
          <div class="control maximize"></div>
        </div>
      </div>
      <div class="text">Loading...</div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Loader Removal Script -->
    <script>
      window.addEventListener("load", () => {
        const loader = document.querySelector(".terminal-loader");
        if (loader) {
          loader.style.opacity = "0";
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>

  </body>
</html>
